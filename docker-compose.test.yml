# ==============================================================================
# Spectre — Docker Compose (Test)
# ==============================================================================

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: spectre-postgres-test
    environment:
      POSTGRES_USER: spectre_test
      POSTGRES_PASSWORD: spectre_test_password
      POSTGRES_DB: spectre_test_db
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectre_test -d spectre_test_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: spectre-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
