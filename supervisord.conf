; ==============================================================================
; Spectre — Supervisord Configuration (Hugging Face Spaces)
;
; Manages all services inside the single Docker container:
;   1. PostgreSQL  (priority 10 — starts first)
;   2. Redis       (priority 20)
;   3. FastAPI     (priority 30 — after DB+Redis ready)
; ==============================================================================

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
loglevel=info
pidfile=/var/run/supervisord.pid

; ==============================================================================
; PostgreSQL
; ==============================================================================
[program:postgresql]
command=/usr/lib/postgresql/15/bin/postgres -D /var/lib/postgresql/data -c listen_addresses='localhost' -c port=5432 -c shared_buffers=128MB -c max_connections=50 -c log_min_messages=warning
user=postgres
priority=10
autostart=%(ENV_PG_AUTOSTART)s
autorestart=%(ENV_PG_AUTOSTART)s
startsecs=5
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ==============================================================================
; Redis
; ==============================================================================
[program:redis]
command=/usr/bin/redis-server --port 6379 --maxmemory 128mb --maxmemory-policy allkeys-lru --save "" --daemonize no --loglevel warning      
priority=20
autostart=true
autorestart=true
startsecs=2
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
; ==============================================================================
; Spectre FastAPI (uvicorn)
; ==============================================================================
[program:spectre-api]
command=/app/.venv/bin/uvicorn spectre.main:create_app --factory --host 0.0.0.0 --port 7860 --workers 1 --timeout-keep-alive 120
directory=/app
environment=PYTHONPATH="/app/src",PYTHONUNBUFFERED="1"
priority=30
autostart=true
autorestart=true
startsecs=10
startretries=5
; Wait for DB and Redis to be ready (handled by start.sh pre-check)
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

