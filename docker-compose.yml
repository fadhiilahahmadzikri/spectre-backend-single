# ==============================================================================
# Spectre — Docker Compose (Development)
# ==============================================================================

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: spectre-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zikri234postgre
      POSTGRES_DB: spectre
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spectre"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: spectre-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  # --- Spectre API ---
  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: spectre-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./artifact:/app/artifact:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
